<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>フリマ出品アシスタント</title>
<style>
  :root { color-scheme: light dark; }
  body {
    font-family: -apple-system, BlinkMacSystemFont, "Hiragino Kaku Gothic ProN", "Yu Gothic", sans-serif;
    max-width: 640px;
    margin: 0 auto;
    padding: 24px 16px 64px;
    background: #fafafa;
    color: #1a1a1a;
  }
  h1 { font-size: 1.3rem; margin-bottom: 4px; }
  p.sub { color: #666; margin-top: 0; font-size: 0.9rem; }
  .card {
    background: #fff;
    border-radius: 12px;
    padding: 20px;
    box-shadow: 0 1px 4px rgba(0,0,0,0.08);
    margin-bottom: 16px;
  }
  input[type="file"] { display: block; margin: 12px 0; }
  button {
    background: #ff4b6e;
    color: #fff;
    border: none;
    border-radius: 8px;
    padding: 10px 20px;
    font-size: 1rem;
    cursor: pointer;
  }
  button:disabled { background: #ccc; cursor: not-allowed; }
  #preview {
    max-width: 100%;
    max-height: 300px;
    border-radius: 8px;
    display: none;
    margin-top: 12px;
  }
  #status { margin-top: 12px; color: #666; font-size: 0.9rem; }
  #result { display: none; }
  .field { margin-bottom: 14px; }
  .field label {
    display: block;
    font-weight: 600;
    font-size: 0.85rem;
    color: #888;
    margin-bottom: 4px;
  }
  .field textarea, .field .value {
    width: 100%;
    box-sizing: border-box;
    font-size: 0.95rem;
    line-height: 1.5;
    white-space: pre-wrap;
  }
  textarea {
    border: 1px solid #ddd;
    border-radius: 6px;
    padding: 8px;
    resize: vertical;
    font-family: inherit;
  }
  .tags { display: flex; flex-wrap: wrap; gap: 6px; }
  .tag {
    background: #f0f0f0;
    border-radius: 999px;
    padding: 4px 10px;
    font-size: 0.85rem;
  }
  .copy-btn {
    background: #eee;
    color: #333;
    font-size: 0.8rem;
    padding: 4px 10px;
    border-radius: 6px;
    margin-left: 8px;
  }
  .error { color: #c0392b; margin-top: 12px; }
</style>
</head>
<body>
  <h1>フリマ出品アシスタント</h1>
  <p class="sub">写真をアップロードすると、タイトル・説明文・タグを自動生成します(価格は含まれません)。</p>

  <div class="card">
    <input type="file" id="photo" accept="image/*" capture="environment">
    <img id="preview" alt="プレビュー">
    <div>
      <button id="analyzeBtn" disabled>出品情報を生成する</button>
    </div>
    <div id="status"></div>
    <div class="error" id="error"></div>
  </div>

  <div class="card" id="result">
    <div class="field">
      <label>タイトル <button class="copy-btn" data-copy="title">コピー</button></label>
      <textarea id="title" rows="2"></textarea>
    </div>
    <div class="field">
      <label>説明文 <button class="copy-btn" data-copy="description">コピー</button></label>
      <textarea id="description" rows="8"></textarea>
    </div>
    <div class="field">
      <label>タグ</label>
      <div class="tags" id="tags"></div>
    </div>
    <div class="field">
      <label>カテゴリ(推定)</label>
      <div class="value" id="category_guess"></div>
    </div>
    <div class="field">
      <label>状態(推定)</label>
      <div class="value" id="condition_guess"></div>
    </div>
  </div>

<script>
const photoInput = document.getElementById('photo');
const preview = document.getElementById('preview');
const analyzeBtn = document.getElementById('analyzeBtn');
const statusEl = document.getElementById('status');
const errorEl = document.getElementById('error');
const resultEl = document.getElementById('result');

photoInput.addEventListener('change', () => {
  errorEl.textContent = '';
  const file = photoInput.files[0];
  if (!file) { analyzeBtn.disabled = true; preview.style.display = 'none'; return; }
  preview.src = URL.createObjectURL(file);
  preview.style.display = 'block';
  analyzeBtn.disabled = false;
});

analyzeBtn.addEventListener('click', async () => {
  const file = photoInput.files[0];
  if (!file) return;

  analyzeBtn.disabled = true;
  statusEl.textContent = 'AIが写真を解析中です…(数秒〜数十秒かかります)';
  errorEl.textContent = '';
  resultEl.style.display = 'none';

  const formData = new FormData();
  formData.append('photo', file);

  try {
    const res = await fetch('/analyze', { method: 'POST', body: formData });
    const data = await res.json();
    if (!res.ok) throw new Error(data.error || 'エラーが発生しました');

    document.getElementById('title').value = data.title || '';
    document.getElementById('description').value = data.description || '';
    document.getElementById('category_guess').textContent = data.category_guess || '';
    document.getElementById('condition_guess').textContent = data.condition_guess || '';

    const tagsEl = document.getElementById('tags');
    tagsEl.innerHTML = '';
    (data.tags || []).forEach(tag => {
      const span = document.createElement('span');
      span.className = 'tag';
      span.textContent = tag;
      tagsEl.appendChild(span);
    });

    resultEl.style.display = 'block';
    statusEl.textContent = '完了しました。内容を確認・修正してからご利用ください。';
  } catch (err) {
    errorEl.textContent = err.message;
    statusEl.textContent = '';
  } finally {
    analyzeBtn.disabled = false;
  }
});

document.querySelectorAll('.copy-btn').forEach(btn => {
  btn.addEventListener('click', () => {
    const target = document.getElementById(btn.dataset.copy);
    navigator.clipboard.writeText(target.value);
    btn.textContent = 'コピー済';
    setTimeout(() => { btn.textContent = 'コピー'; }, 1500);
  });
});
</script>
</body>
</html>
